<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>台電材料管理系統 — 職人優化版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  
  <style>
    :root {
      --ukiyo-deep-blue: #1D3B56;
      --ukiyo-mid-blue: #2A587A;
      --ukiyo-light-blue: #6B93B8;
      --ukiyo-foam: #F0F4F5;
      --ukiyo-sky: #E6D3A3;
      --ukiyo-paper: #F2E6D9;
      --glass-bg: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(255, 255, 255, 0.9);
      --danger-red: #e74c3c;
      --success-green: #2ecc71;
      --warning-orange: #f39c12;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--ukiyo-foam);
      color: #333;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    header {
      background: var(--ukiyo-deep-blue);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(29, 59, 86, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; }

    /* 儀表板卡片 */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.03);
    }

    .stat-card {
      background: white;
      border-left: 6px solid var(--ukiyo-mid-blue);
      padding: 15px 20px;
      border-radius: 8px;
    }
    .stat-card.warning { border-left-color: var(--warning-orange); }
    .stat-card.success { border-left-color: var(--success-green); }
    
    .stat-title { font-size: 13px; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
    .stat-value { font-size: 26px; font-weight: 900; color: var(--ukiyo-deep-blue); }

    /* 操作控制列 */
    .control-panel {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      min-width: 250px;
      padding: 11px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .search-input:focus { border-color: var(--ukiyo-mid-blue); }

    .select-filter {
      padding: 11px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 14px;
      outline: none;
    }

    /* 按鈕樣式 */
    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background-color: var(--ukiyo-mid-blue); color: white; }
    .btn-primary:hover { background-color: var(--ukiyo-deep-blue); }
    .btn-success { background-color: var(--ukiyo-light-blue); color: white; }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger { background-color: var(--danger-red); color: white; }
    .btn-danger:hover { background-color: #c0392b; }
    .btn-secondary { background-color: #7f8c8d; color: white; }

    /* 分頁標籤 */
    .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; gap: 10px; }
    .tab {
      padding: 12px 24px;
      cursor: pointer;
      font-weight: bold;
      color: #7f8c8d;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      border-bottom-color: var(--ukiyo-deep-blue);
      color: var(--ukiyo-deep-blue);
      font-size: 15px;
    }

    /* 表格樣式 */
    .table-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background-color: var(--ukiyo-deep-blue); color: white; padding: 14px; font-size: 14px; }
    td { padding: 12px 14px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
    tr:hover { background-color: #fcfdfe; }

    /* 狀態標籤 */
    .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .badge-issue { background-color: #fce4d6; color: #c65911; } 
    .badge-return { background-color: #e2efda; color: #375623; } 
    .badge-borrow { background-color: #fff2cc; color: #7f6000; } 
    .badge-diff { background-color: #fff59d; color: #5d4037; border: 1px solid #fff59d; }
    .badge-none { background-color: #f0f4f5; color: #7f8c8d; }

    /* 彈出視窗 Modal */
    .modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 520px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2); position: relative; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .form-group { margin-bottom: 16px; position: relative; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: var(--ukiyo-deep-blue); }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none;
    }
    .form-group input:focus { border-color: var(--ukiyo-mid-blue); }

    /* 關鍵字自動提示選單 */
    .suggestions-box {
      border: 1px solid #ccc; border-top: none; max-height: 180px; overflow-y: auto;
      background: white; position: absolute; width: 100%; z-index: 99; border-radius: 0 0 6px 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .suggestion-item { padding: 10px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    .suggestion-item:hover { background-color: var(--ukiyo-foam); color: var(--ukiyo-deep-blue); font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>材料管理系統 🗃️ <span style="font-size: 14px; font-weight: normal; opacity: 0.8;">| 即時庫存與 ERP 對帳模組</span></h1>
    <div id="sysTime" style="font-weight: bold; font-size: 14px; opacity: 0.9;"></div>
  </header>

  <div class="dashboard-grid">
    <div class="stat-card">
      <div class="stat-title">📦 系統總品項數</div>
      <div class="stat-value" id="totalItems">0</div>
    </div>
    <div class="stat-card success">
      <div class="stat-title">📊 系統即時總庫存量</div>
      <div class="stat-value" id="totalStockValue">0</div>
    </div>
    <div class="stat-card warning">
      <div class="stat-title">📉 本地累計總領料量</div>
      <div class="stat-value" id="totalUsage">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">📅 年平均領料量</div>
      <div class="stat-value" id="avgYearly">0</div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px;">
    <div class="card" style="display: flex; flex-direction: column; justify-content: center;">
      <h3 style="margin: 0 0 15px 0; color: var(--ukiyo-deep-blue); font-size: 16px;">季度領料統計 (單位: 件)</h3>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center;">
        <div style="background:#f8f9fa; padding:10px; border-radius:6px;"><div style="color:#7f8c8d; font-size:12px;">第一季</div><div style="font-weight:bold; font-size:18px; color:var(--ukiyo-mid-blue);" id="season1">0</div></div>
        <div style="background:#f8f9fa; padding:10px; border-radius:6px;"><div style="color:#7f8c8d; font-size:12px;">第二季</div><div style="font-weight:bold; font-size:18px; color:var(--ukiyo-mid-blue);" id="season2">0</div></div>
        <div style="background:#f8f9fa; padding:10px; border-radius:6px;"><div style="color:#7f8c8d; font-size:12px;">第三季</div><div style="font-weight:bold; font-size:18px; color:var(--ukiyo-mid-blue);" id="season3">0</div></div>
        <div style="background:#f8f9fa; padding:10px; border-radius:6px;"><div style="color:#7f8c8d; font-size:12px;">第四季</div><div style="font-weight:bold; font-size:18px; color:var(--ukiyo-mid-blue);" id="season4">0</div></div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin: 0 0 10px 0; color: var(--ukiyo-deep-blue); font-size: 16px;">12個月本地領料趨勢圖</h3>
      <div id="monthlyChart" style="display: flex; justify-content: space-between; align-items: flex-end; height: 75px; padding-top: 5px;">
        </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabMaterials" onclick="switchTab('materials')">📋 庫存管理與即時差異</div>
    <div class="tab" id="tabLogs" onclick="switchTab('logs')">🪵 本地異動歷史日誌</div>
  </div>

  <div class="control-panel">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 輸入物料編號、品名關鍵字快速搜尋..." oninput="renderData()">
    
    <select id="diffFilter" class="select-filter" onchange="renderData()">
      <option value="all">顯示所有物料檔</option>
      <option value="diff">⚠️ 僅顯示有本地異動 (有差異) 的物料</option>
    </select>

    <button class="btn btn-primary" onclick="openTxModal('')">＋ 登記領/退/借料</button>
    
    <button class="btn btn-success" onclick="document.getElementById('excelFileInput').click()">📥 匯入 ERP 庫存 Excel</button>
    <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" style="display:none;">
    
    <button class="btn btn-danger" onclick="clearAllTransactions()">🧹 清空本地異動 (平帳)</button>
  </div>

  <div id="materialsSection" class="table-container">
    <div id="tableContainer"></div>
  </div>

  <div id="logsSection" class="table-container" style="display: none;">
    <div id="logsContainer"></div>
  </div>
</div>

<div id="txModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0; color:var(--ukiyo-deep-blue); border-bottom:2px solid var(--ukiyo-foam); padding-bottom:10px;">📝 新增本地料件異動登記</h3>
    <form id="txForm">
      <div class="form-group">
        <label for="txMaterialId">物料編號 (料號)</label>
        <input type="text" id="txMaterialId" placeholder="請輸入台電料號..." autocomplete="off" required>
        <div id="suggestions" class="suggestions-box"></div>
      </div>
      
      <div class="form-group">
        <label>對應系統品名規範</label>
        <div id="txMaterialName" style="background:#f8f9fa; padding:10px; border-radius:6px; font-size:13px; color:#555; font-weight:bold; border:1px dashed #ccc;">
          請先輸入上方料號進行檢索...
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
          <label for="txType">異動類型</label>
          <select id="txType">
            <option value="領料">領料 (庫存扣減 -)</option>
            <option value="退料">退料 (庫存增加 +)</option>
            <option value="借用">借用 (庫存扣減 -)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="txQty">數量</label>
          <input type="number" id="txQty" min="1" placeholder="輸入異動數量" required>
        </div>
      </div>

      <div class="form-group">
        <label for="txDate">異動日期</label>
        <input type="date" id="txDate" required>
      </div>

      <div class="form-group">
        <label for="txNote">備註說明</label>
        <input type="text" id="txNote" placeholder="例如：領料工程名稱、借用人、退料原因等">
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
        <button type="button" class="btn btn-secondary" onclick="closeTxModal()">取消</button>
        <button type="submit" class="btn btn-primary">確認送出登記</button>
      </div>
    </form>
  </div>
</div>

<script>
  // 1. 初始化 Dexie 本地資料庫
  const db = new Dexie("TaiPowerMaterialDB");
  db.version(1).stores({
    materials: 'id, name, rating, unit, location, erpStock',
    transactions: '++id, materialId, type, qty, date, note'
  });

  // 顯示當前系統時間
  document.getElementById('sysTime').innerText = `系統時間：${new Date().toLocaleDateString('zh-TW')} ${new Date().toLocaleTimeString('zh-TW', {hour12:false})}`;

  // 2. 解析 Excel 數字防錯機制
  function parseNumber(val) {
    if (val === undefined || val === null || val === "") return 0;
    if (typeof val === 'number') return val;
    let cleaned = String(val).replace(/,/g, '').trim();
    let parsed = parseFloat(cleaned);
    return isNaN(parsed) ? 0 : parsed;
  }

  // 3. 處理 Excel 檔案匯入 (核心修正比對邏輯)
  document.getElementById('excelFileInput').addEventListener('change', handleExcelImport);

  function handleExcelImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async function(evt) {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        // 將外部 Excel 轉為 JSON 物件陣列
        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
        
        let updateCount = 0;
        let insertCount = 0;
        
        // 啟動 Dexie 事務提升寫入效能與一致性
        await db.transaction('rw', db.materials, async () => {
          for (let row of jsonData) {
            let materialCode = "";
            let name = "";
            let rating = 0;
            let unit = "";
            let location = "";
            let stock = 0;
            
            // 關鍵修正：修剪欄位名稱的前後空白，避免讀取不到
            for (let key in row) {
              let trimmedKey = key.trim();
              if (trimmedKey === "物料編號") materialCode = String(row[key]).trim();
              else if (trimmedKey === "名稱規範") name = String(row[key]).trim();
              else if (trimmedKey === "評價") rating = parseInt(row[key]) || 0;
              else if (trimmedKey === "單位") unit = String(row[key]).trim();
              else if (trimmedKey === "儲格") location = String(row[key]).trim();
              else if (trimmedKey === "庫存") stock = parseNumber(row[key]);
            }
            
            // 如果連基本料號都沒有則跳過
            if (!materialCode) continue;
            
            // 精準比對（料號純字串化）
            const existing = await db.materials.get(materialCode);
            if (existing) {
              await db.materials.update(materialCode, {
                name: name || existing.name,
                rating: rating !== undefined ? rating : existing.rating,
                unit: unit || existing.unit,
                location: location || existing.location,
                erpStock: stock // 以最新下載的 ERP 庫存全面覆蓋基準
              });
              updateCount++;
            } else {
              await db.materials.add({
                id: materialCode,
                name: name,
                rating: rating,
                unit: unit,
                location: location,
                erpStock: stock
              });
              insertCount++;
            }
          }
        });
        
        alert(`🎉 匯入成功！\n已成功對應更新 ${updateCount} 筆物料基準，新上架 ${insertCount} 筆獨立物料。`);
        document.getElementById('excelFileInput').value = ""; // 清空
        await renderData();
      } catch (err) {
        console.error(err);
        alert("❌ 讀取 Excel 檔案失敗，請確認是否為附檔之標準台電格式欄位！");
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // 4. 核心渲染模組：動態計算庫存與計算差異
  async function renderData() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
    const diffFilter = document.getElementById('diffFilter').value;
    
    const materials = await db.materials.toArray();
    const transactions = await db.transactions.toArray();
    
    // 統計本地每項物料的累計變動量
    const txSummary = {};
    transactions.forEach(tx => {
      if (!txSummary[tx.materialId]) {
        txSummary[tx.materialId] = { 領料: 0, 退料: 0, 借用: 0, netChange: 0 };
      }
      let qty = parseInt(tx.qty) || 0;
      if (tx.type === "領料") {
        txSummary[tx.materialId].領料 += qty;
        txSummary[tx.materialId].netChange -= qty; // 領料扣庫存
      } else if (tx.type === "退料") {
        txSummary[tx.materialId].退料 += qty;
        txSummary[tx.materialId].netChange += qty; // 退料補庫存
      } else if (tx.type === "借用") {
        txSummary[tx.materialId].借用 += qty;
        txSummary[tx.materialId].netChange -= qty; // 借用扣庫存
      }
    });
    
    // 更新上方儀表板看板
    updateDashboardStats(materials, transactions, txSummary);
    
    // 渲染主庫存表格
    let tableHtml = `
      <table>
        <thead>
          <tr>
            <th>物料編號 (料號)</th>
            <th>名稱規範 (品名規格)</th>
            <th>評價</th>
            <th>單位</th>
            <th>儲格位置</th>
            <th>ERP 基準庫存</th>
            <th>本地異動累計</th>
            <th>即時庫存 (現況)</th>
            <th>狀態與差異</th>
            <th>快捷操作</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    let displayedRows = 0;
    
    for (let m of materials) {
      // 關鍵字過濾條件
      if (searchVal && !m.id.toLowerCase().includes(searchVal) && !m.name.toLowerCase().includes(searchVal)) {
        continue;
      }
      
      let erpStock = m.erpStock || 0;
      let summary = txSummary[m.id] || { 領料: 0, 退料: 0, 借用: 0, netChange: 0 };
      let realTimeStock = erpStock + summary.netChange; // 即時庫存公式
      
      // 差異過濾條件
      if (diffFilter === "diff" && summary.netChange === 0) {
        continue;
      }
      
      displayedRows++;
      
      let changeText = "-";
      if (summary.領料 > 0 || summary.退料 > 0 || summary.借用 > 0) {
        changeText = `領:${summary.領料} | 退:${summary.退料} | 借:${summary.借用}`;
      }
      
      let statusBadge = `<span class="badge badge-none">同步中</span>`;
      let rowStyle = "";
      if (summary.netChange !== 0) {
        let sign = summary.netChange > 0 ? "+" : "";
        statusBadge = `<span class="badge badge-diff">待平帳 (${sign}${summary.netChange})</span>`;
        rowStyle = "background-color: #fffde7;"; // 有差異則高亮黃底
      }
      
      tableHtml += `
        <tr style="${rowStyle}">
          <td style="font-family: monospace; font-weight: bold; color: #111;">${m.id}</td>
          <td title="${m.name}">${m.name.length > 28 ? m.name.substring(0, 28) + '...' : m.name}</td>
          <td style="color:#f39c12; font-weight:bold;">★${m.rating}</td>
          <td><span style="color:#666; font-weight:bold;">${m.unit || '-'}</span></td>
          <td><mark style="background:#e1f5fe; padding:3px 6px; border-radius:4px; color:#0288d1; font-weight:bold;">${m.location || '未指定'}</mark></td>
          <td style="font-weight: bold; color:#7f8c8d; text-align:center;">${erpStock}</td>
          <td style="font-size:12px; color: var(--ukiyo-mid-blue); font-weight:600;">${changeText}</td>
          <td style="font-size:15px; font-weight: 900; text-align:center; color: ${realTimeStock < 0 ? 'var(--danger-red)' : 'var(--ukiyo-deep-blue)'};">${realTimeStock}</td>
          <td>${statusBadge}</td>
          <td>
            <button class="btn btn-primary" style="padding:4px 10px; font-size:12px; border-radius:4px;" onclick="openTxModal('${m.id}')">登記異動</button>
          </td>
        </tr>
      `;
    }
    
    if (displayedRows === 0) {
      tableHtml += `<tr><td colspan="10" style="text-align:center; color:#999; padding:40px; font-weight:bold;">💡 查無符合條件的物料檔案。請先點選上方匯入 ERP 庫存 Excel！</td></tr>`;
    }
    
    tableHtml += `</tbody></table>`;
    document.getElementById('tableContainer').innerHTML = tableHtml;
    
    // 渲染歷史日誌
    renderTransactionLogs(transactions);
  }

  // 5. 更新看板統計與原有的趨勢圖表
  function updateDashboardStats(materials, transactions, txSummary) {
    document.getElementById('totalItems').innerText = materials.length;
    
    let totalStock = 0;
    materials.forEach(m => {
      let erp = m.erpStock || 0;
      let net = txSummary[m.id] ? txSummary[m.id].netChange : 0;
      totalStock += (erp + net);
    });
    document.getElementById('totalStockValue').innerText = totalStock;
    
    // 計算領料統計
    let totalUsage = 0;
    let monthly = new Array(12).fill(0);
    let quarterly = new Array(4).fill(0);
    let years = new Set();
    
    transactions.forEach(tx => {
      if (tx.type === "領料" || tx.type === "借用") { // 統計消耗用料量
        let d = new Date(tx.date);
        let qty = parseInt(tx.qty) || 0;
        totalUsage += qty;
        
        if (!isNaN(d.getMonth())) {
          monthly[d.getMonth()] += qty;
          quarterly[Math.floor(d.getMonth() / 3)] += qty;
          years.add(d.getFullYear());
        }
      }
    });
    
    document.getElementById('totalUsage').innerText = totalUsage;
    document.getElementById('avgYearly').innerText = years.size > 0 ? (totalUsage / years.size).toFixed(1) : totalUsage;
    
    document.getElementById('season1').innerText = quarterly[0];
    document.getElementById('season2').innerText = quarterly[1];
    document.getElementById('season3').innerText = quarterly[2];
    document.getElementById('season4').innerText = quarterly[3];
    
    // 渲染 12 個月客製化 HTML 柱狀圖
    let mHtml = "";
    const maxMonthly = Math.max(...monthly);
    ["一","二","三","四","五","六","七","八","九","十","十一","十二"].forEach((m, i) => {
      let val = monthly[i];
      let barH = maxMonthly > 0 ? (val / maxMonthly) * 55 : 0; 
      mHtml += `
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; margin: 0 2px;">
          <div style="height: 55px; display: flex; align-items: flex-end; justify-content: center; width: 100%;">
            <div style="width: 65%; background: var(--ukiyo-light-blue); height: ${Math.max(barH, 2)}px; border-radius: 3px 3px 0 0; transition: height 0.3s ease;"></div>
          </div>
          <div style="font-weight: bold; font-size: 11px; margin-top: 3px; color: var(--ukiyo-deep-blue);">${val}</div>
          <div style="color: #888; font-size: 10px;">${m}月</div>
        </div>
      `;
    });
    document.getElementById('monthlyChart').innerHTML = mHtml;
  }

  // 6. 渲染歷史日誌
  function renderTransactionLogs(transactions) {
    let sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date) || b.id - a.id);
    let logHtml = `
      <table>
        <thead>
          <tr>
            <th>異動單號</th>
            <th>登記日期</th>
            <th>物料編號</th>
            <th>異動類型</th>
            <th>登記數量</th>
            <th>備註說明</th>
            <th>管理操作</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    sorted.forEach(tx => {
      let badgeClass = "badge-issue";
      if (tx.type === "退料") badgeClass = "badge-return";
      if (tx.type === "借用") badgeClass = "badge-borrow";
      
      logHtml += `
        <tr>
          <td style="font-weight:bold; color:#7f8c8d;">#TX-${String(tx.id).padStart(5, '0')}</td>
          <td>${tx.date}</td>
          <td style="font-family: monospace; font-weight:bold;">${tx.materialId}</td>
          <td><span class="badge ${badgeClass}">${tx.type}</span></td>
          <td style="font-weight:bold; font-size:15px;">${tx.qty}</td>
          <td style="color:#555; font-size:13px;">${tx.note || '-'}</td>
          <td>
            <button class="btn btn-danger" style="padding:4px 8px; font-size:12px; border-radius:4px;" onclick="deleteTransaction(${tx.id})">作廢</button>
          </td>
        </tr>
      `;
    });
    
    if (sorted.length === 0) {
      logHtml += `<tr><td colspan="7" style="text-align:center; color:#999; padding:30px; font-weight:bold;">💡 目前現場尚無任何領、退、借異動紀錄。</td></tr>`;
    }
    logHtml += `</tbody></table>`;
    document.getElementById('logsContainer').innerHTML = logHtml;
  }

  // 7. 刪除單筆本地異動
  async function deleteTransaction(id) {
    if (confirm("確定要作廢此筆本地異動紀錄嗎？作廢後即時庫存將即時回補。")) {
      await db.transactions.delete(id);
      await renderData();
    }
  }

  // 8. 核心設計：清空本地異動 (平帳核心程序)
  async function clearAllTransactions() {
    if (confirm("⚠️ 【重要平帳確認】\n\n您確定要清空所有本地登記的「領/退/借」紀錄嗎？\n\n👉 適用時機：當您已經將本系統內的所有異動資料，全部「補登打」進台電 ERP 系統中，且剛剛已經下載並匯入了最新的 ERP 庫存 Excel 時。\n\n執行「平帳」會將本地累計變動量歸零，讓系統即時庫存完美對準最新匯入的 ERP 基準，避免發生重複扣減！")) {
      await db.transactions.clear();
      await renderData();
      alert("✨ 平帳完成！本地暫存變動量已全數歸零，目前庫存百分之百與最新的 ERP 基準完全同步！");
    }
  }

  // 9. 視窗控制與自動提示關鍵字搜尋
  async function openTxModal(materialId) {
    document.getElementById('txModal').classList.add('show');
    document.getElementById('txMaterialId').value = materialId;
    document.getElementById('txQty').value = "";
    document.getElementById('txNote').value = "";
    document.getElementById('suggestions').innerHTML = "";
    
    // 預設日期為當天
    let now = new Date();
    document.getElementById('txDate').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    
    if (materialId) {
      const m = await db.materials.get(materialId);
      document.getElementById('txMaterialName').innerText = m ? m.name : "獨立臨時件";
    } else {
      document.getElementById('txMaterialName').innerText = "請輸入左上方料號進行檢索...";
    }
  }

  function closeTxModal() { document.getElementById('txModal').classList.remove('show'); }

  // 料號輸入欄位動態監聽 (自動提示)
  document.getElementById('txMaterialId').addEventListener('input', async (e) => {
    let val = e.target.value.trim();
    let sugBox = document.getElementById('suggestions');
    sugBox.innerHTML = "";
    
    if (!val) {
      document.getElementById('txMaterialName').innerText = "請輸入上方料號進行檢索...";
      return;
    }
    
    // 從 Dexie 模糊檢索前 6 筆相符物料
    let matches = await db.materials
      .filter(m => m.id.includes(val) || m.name.includes(val))
      .limit(6)
      .toArray();
      
    matches.forEach(m => {
      let div = document.createElement('div');
      div.className = "suggestion-item";
      div.innerText = `🔢 ${m.id} | ${m.name.substring(0,22)}...`;
      div.onclick = () => {
        document.getElementById('txMaterialId').value = m.id;
        document.getElementById('txMaterialName').innerText = m.name;
        sugBox.innerHTML = "";
      };
      sugBox.appendChild(div);
    });
    
    const matchedMat = await db.materials.get(val);
    if (matchedMat) {
      document.getElementById('txMaterialName').innerText = matchedMat.name;
    } else {
      document.getElementById('txMaterialName').innerText = "⚠️ 注意：此料號尚未存在於主庫存表中，送出將直接建立此件的異動紀錄。";
    }
  });

  // 異動表單送出邏輯
  document.getElementById('txForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let materialId = document.getElementById('txMaterialId').value.trim();
    let type = document.getElementById('txType').value;
    let qty = parseInt(document.getElementById('txQty').value) || 0;
    let date = document.getElementById('txDate').value;
    let note = document.getElementById('txNote').value.trim();
    
    if (!materialId || qty <= 0 || !date) {
      alert("請確實填妥所有必填欄位！");
      return;
    }
    
    const m = await db.materials.get(materialId);
    if (!m) {
      if (confirm(`物料編號 ${materialId} 尚未存在於庫存主表（可能尚未由 ERP 匯入過），是否要直接強制登記此料件的本地異動紀錄？`)) {
        await db.materials.add({
          id: materialId,
          name: "本地自建暫存件 (待匯入正式 Excel 更新規格)",
          rating: 0, unit: "件", location: "未指定", erpStock: 0
        });
      } else {
        return;
      }
    }
    
    await db.transactions.add({ materialId, type, qty, date, note });
    closeTxModal();
    await renderData();
  });

  // 分頁切換控制
  function switchTab(tabName) {
    if (tabName === 'materials') {
      document.getElementById('tabMaterials').classList.add('active');
      document.getElementById('tabLogs').classList.remove('active');
      document.getElementById('materialsSection').style.display = 'block';
      document.getElementById('logsSection').style.display = 'none';
    } else {
      document.getElementById('tabMaterials').classList.remove('active');
      document.getElementById('tabLogs').classList.add('active');
      document.getElementById('materialsSection').style.display = 'none';
      document.getElementById('logsSection').style.display = 'block';
    }
  }

  // 網頁開啟後自動載入初始化
  window.onload = async () => {
    await renderData();
  };
</script>

</body>
</html>
